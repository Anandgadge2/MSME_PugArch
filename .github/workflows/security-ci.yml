name: Security CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  security-build-test:
    name: Typecheck, Build, Audit, Security Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/msme_ci
      JWT_SECRET: ci_jwt_secret_must_be_at_least_32_chars_long
      REDIS_URL: redis://localhost:6379
      REDIS_TLS: "false"
      REDIS_PREFIX: msme_ci:
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      STORAGE_PROVIDER: cloudinary
      PAYMENT_PROVIDER: bank_transfer

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: msme_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npm run prisma:validate --workspace=backend

      - name: Prisma generate
        run: npx prisma generate --schema backend/prisma/schema.prisma

      - name: Backend typecheck
        run: npm run typecheck --workspace=backend

      - name: Frontend typecheck
        run: npm run typecheck --workspace=frontend

      - name: Security lint
        run: npm run lint:security

      - name: Security tests
        run: npm run test:security

      - name: Static audit evidence checks
        run: npm run security:static

      - name: Production readiness checks
        run: npm run production:check

      - name: Backend build
        run: npm run build --workspace=backend

      - name: Frontend build
        run: npm run build --workspace=frontend

      - name: Dependency audit
        run: npm run audit:deps
